<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Viewport mobile: evita zoom, respeta safe areas del notch y home bar -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>PawTalk</title>
    <meta name="description" content="PawTalk - La app para la comunidad Therian" />
    <meta name="author" content="PawTalk" />

    <!-- PWA / Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PawTalk" />
    <meta name="theme-color" content="#7ed97a" />

    <!-- Deshabilitar detección automática de teléfonos/emails/fechas en iOS -->
    <meta name="format-detection" content="telephone=no, email=no, date=no, address=no" />

    <!-- Open Graph -->
    <meta property="og:title" content="PawTalk" />
    <meta property="og:description" content="La app para la comunidad Therian" />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
